services:
  - type: web
    name: teleios-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@teleios.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        sync: false
